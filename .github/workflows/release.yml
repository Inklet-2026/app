name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog from tag
        run: git tag -l --format='%(contents)' ${{ github.ref_name }} > /tmp/changelog.md

      - name: Delete existing release if any
        run: gh release delete ${{ github.ref_name }} --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes-file /tmp/changelog.md --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Decode Apple API Key
        run: |
          mkdir -p "$HOME/private_keys"
          KEY_PATH="$HOME/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$KEY_PATH"
          if ! head -n1 "$KEY_PATH" | grep -q 'BEGIN PRIVATE KEY'; then
            printf '%s' "${{ secrets.APPLE_API_KEY }}" > "$KEY_PATH"
          fi
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build & Publish (macOS)
        run: pnpm build && pnpm exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

  build-win:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build & Publish (Windows)
        run: pnpm build && pnpm exec electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git cat-file -p ${{ github.ref_name }} | sed '1,/^$/d' > /tmp/changelog.md
          gh release edit ${{ github.ref_name }} --notes-file /tmp/changelog.md --draft=false
