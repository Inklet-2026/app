appId: com.inklet.portal
productName: inklet Portal
directories:
  buildResources: resources
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
artifactName: "InkletPortal-${version}-${os}-${arch}.${ext}"
protocols:
  name: inklet
  schemes:
    - inklet
mac:
  category: public.app-category.productivity
  icon: resources/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  artifactName: "InkletPortal-${version}-win-${arch}-setup.${ext}"
publish:
  provider: github
  owner: Inklet-2026
  repo: app
